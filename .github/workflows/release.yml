name: Build Pack, and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build with Docker Compose
        run: |
          # 启动编译服务
          docker compose -f pack_env/docker_compose.yml up --exit-code-from builder
          
      - name: Check output
        run: ls -l dist/

      - name: Release
        if: hashFiles('dist/*.deb') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}